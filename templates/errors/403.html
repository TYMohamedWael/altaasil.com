<!DOCTYPE html>
<html lang="ha" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Ba a ba da izini ba | Littattafan Hausa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{primary:{DEFAULT:"#1a5632",light:"#2d7a4a",dark:"#0f3d22"},gold:{DEFAULT:"#c8a84e",light:"#e0c878",dark:"#a88a2e"},cream:{DEFAULT:"#faf8f0",dark:"#f0ead6"}}}}}</script>
    <link rel="stylesheet" href="/static/css/custom.css">
    <script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #faf8f0; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            10%, 30%, 50%, 70%, 90% { transform: rotate(-3deg); }
            20%, 40%, 60%, 80% { transform: rotate(3deg); }
        }
        @keyframes lockPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(200,168,78,0.3); }
            50% { box-shadow: 0 0 0 15px rgba(200,168,78,0); }
        }
        @keyframes keyhole-glow {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .fade-in-1 { animation: fadeInUp 0.6s ease-out 0.1s both; }
        .fade-in-2 { animation: fadeInUp 0.6s ease-out 0.3s both; }
        .fade-in-3 { animation: fadeInUp 0.6s ease-out 0.5s both; }

        /* Lock icon */
        .lock-container {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .lock-circle {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a5632, #0f3d22);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: lockPulse 2.5s ease-in-out infinite;
        }
        .lock-body {
            position: relative;
            width: 40px;
            height: 32px;
            background: #c8a84e;
            border-radius: 6px;
            margin-top: 14px;
        }
        .lock-body::before {
            content: '';
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            width: 26px;
            height: 22px;
            border: 4px solid #c8a84e;
            border-bottom: none;
            border-radius: 13px 13px 0 0;
        }
        .lock-keyhole {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 8px;
            background: #1a5632;
            border-radius: 50%;
            animation: keyhole-glow 2s ease-in-out infinite;
        }
        .lock-keyhole::after {
            content: '';
            position: absolute;
            top: 7px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 8px;
            background: #1a5632;
            border-radius: 0 0 2px 2px;
        }
        .lock-container:hover .lock-circle {
            animation: shake 0.6s ease-in-out;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-lg w-full text-center">
        <!-- Animated Lock -->
        <div class="flex justify-center mb-8 fade-in-1">
            <div class="lock-container">
                <div class="lock-circle">
                    <div class="lock-body">
                        <div class="lock-keyhole"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Error Code -->
        <div class="fade-in-1">
            <span class="text-8xl font-black text-primary/10">403</span>
        </div>

        <!-- Title -->
        <h1 class="text-3xl md:text-4xl font-bold text-primary mt-2 fade-in-2">
            Ba a ba da izini ba
        </h1>
        <p class="text-xl text-gold mt-2 fade-in-2" dir="rtl" style="font-family: serif;">
            غير مصرح بالدخول
        </p>

        <!-- Message -->
        <p class="text-gray-600 mt-6 fade-in-3">
            Ba ku da izinin shiga wannan shafin. Idan kuna ganin kuskure ne, don Allah ku shiga da asusun ku ko ku tuntuɓi masu gudanarwa.
        </p>

        <!-- Action Buttons -->
        <div class="mt-8 flex flex-wrap justify-center gap-3 fade-in-3">
            <a href="/login/" class="inline-flex items-center gap-2 bg-gold text-primary px-6 py-3 rounded-xl text-sm font-semibold hover:bg-gold-light transition-all shadow-md hover:shadow-lg hover:-translate-y-0.5">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
                Shiga
            </a>
            <a href="/" class="inline-flex items-center gap-2 bg-primary text-white px-6 py-3 rounded-xl text-sm font-semibold hover:bg-primary-light transition-all shadow-md hover:shadow-lg hover:-translate-y-0.5">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                Koma Gida
            </a>
        </div>

        <p class="mt-12 text-xs text-gray-300 fade-in-3">
            Littattafan Hausa — Dakin Karatu na Ilimi na Musulunci
        </p>
    </div>
</body>
</html>
