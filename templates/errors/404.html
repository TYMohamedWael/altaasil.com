    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #faf8f0; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pageFlip {
            0%, 100% { transform: rotateY(0deg); }
            50% { transform: rotateY(15deg); }
        }
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        .book-float { animation: float 4s ease-in-out infinite; }
        .fade-in-1 { animation: fadeInUp 0.6s ease-out 0.1s both; }
        .fade-in-2 { animation: fadeInUp 0.6s ease-out 0.3s both; }
        .fade-in-3 { animation: fadeInUp 0.6s ease-out 0.5s both; }
        .fade-in-4 { animation: fadeInUp 0.6s ease-out 0.7s both; }

        /* CSS Book Illustration */
        .book-wrapper { perspective: 600px; }
        .book {
            position: relative;
            width: 140px;
            height: 180px;
            transform-style: preserve-3d;
        }
        .book-cover {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #1a5632 0%, #0f3d22 100%);
            border-radius: 4px 12px 12px 4px;
            box-shadow: -4px 4px 0 #c8a84e, -6px 6px 20px rgba(0,0,0,0.2);
        }
        .book-cover::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(255,255,255,0.15);
        }
        .book-spine {
            position: absolute;
            left: 0;
            top: 4px;
            bottom: 4px;
            width: 6px;
            background: #0f3d22;
            border-radius: 2px 0 0 2px;
        }
        .book-gold-detail {
            position: absolute;
            top: 30px;
            left: 24px;
            right: 20px;
            height: 2px;
            background: #c8a84e;
        }
        .book-gold-detail::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 0;
            right: 0;
            height: 2px;
            background: #c8a84e;
        }
        .book-title-area {
            position: absolute;
            top: 50px;
            left: 24px;
            right: 20px;
            text-align: center;
        }
        .book-title-area span {
            color: #c8a84e;
            font-size: 28px;
            font-weight: bold;
        }
        .book-bottom-detail {
            position: absolute;
            bottom: 25px;
            left: 24px;
            right: 20px;
            text-align: center;
        }
        .book-bottom-detail .diamond {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #c8a84e;
            transform: rotate(45deg);
        }
        /* Pages effect */
        .book-pages {
            position: absolute;
            right: -3px;
            top: 6px;
            bottom: 6px;
            width: 8px;
            background: repeating-linear-gradient(
                to bottom,
                #fff 0px, #fff 2px,
                #eee 2px, #eee 3px
            );
            border-radius: 0 2px 2px 0;
        }
        /* Sparkle decorations */
        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #c8a84e;
            border-radius: 50%;
        }
        .sparkle-1 { top: -10px; right: -10px; animation: sparkle 2s ease-in-out 0s infinite; }
        .sparkle-2 { bottom: 20px; left: -15px; animation: sparkle 2s ease-in-out 0.7s infinite; }
        .sparkle-3 { top: 30px; right: -20px; animation: sparkle 2s ease-in-out 1.4s infinite; }

        /* Question mark on book */
        .book-question {
            position: absolute;
            top: 55px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 50px;
            color: #c8a84e;
            opacity: 0.3;
            font-weight: bold;
        }
    </style>
</head>

                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
